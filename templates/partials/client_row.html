<tr class="hover:bg-gray-50/50 transition">
    <td class="px-8 py-4 whitespace-nowrap">
        <div class="flex items-center">
            <div class="h-9 w-9 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-xs">
                {{ client.name|slice:":2"|upper }}
            </div>
            <div class="ml-4">
                <div class="text-sm font-bold text-gray-900">{{ client.name }}</div>
                <div class="text-xs text-gray-400">ID: #{{ client.id }}</div>
            </div>
        </div>
    </td>
    <td class="px-8 py-4 whitespace-nowrap text-sm text-gray-600 font-medium">{{ client.email }}</td>
    <td class="px-8 py-4 whitespace-nowrap">
        {% if client.company %}
        <span class="px-3 py-1 text-xs font-bold bg-blue-50 text-blue-700 rounded-full border border-blue-100 italic">
            {{ client.company }}
        </span>
        {% else %}
        <span class="text-xs text-gray-300 italic">Sin empresa</span>
        {% endif %}
    </td>
    <td class="px-8 py-4 whitespace-nowrap text-right text-sm font-medium">
        <div class="flex justify-end space-x-3">
            <a href="/clientes/{{ client.id }}/editar/" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </a>
            <button hx-delete="/clientes/{{ client.id }}/" hx-target="closest tr" hx-swap="outerHTML" hx-confirm="¿Estás seguro de eliminar este cliente?"
                    class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>
    </td>
</tr>
