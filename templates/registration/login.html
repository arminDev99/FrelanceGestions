<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | RootDev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full flex items-center justify-center p-6 bg-slate-950">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <span class="text-4xl font-black text-white tracking-tighter">Root<span class="text-indigo-500">Dev</span></span>
            <p class="text-slate-500 mt-3 font-medium">Panel de Gestión para Freelancers</p>
        </div>

        <div class="bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl border border-slate-800">
            <h1 class="text-2xl font-bold text-white mb-8 text-center">Bienvenido de nuevo</h1>
            
            {% if form.errors %}
                <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-2xl font-medium text-center">
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label for="id_username" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Usuario</label>
                        <input type="text" name="username" id="id_username" required autofocus
                               class="w-full px-5 py-4 rounded-2xl border border-slate-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition bg-slate-950 text-white placeholder-slate-600">
                    </div>
                    <div>
                        <label for="id_password" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                        <input type="password" name="password" id="id_password" required
                               class="w-full px-5 py-4 rounded-2xl border border-slate-800 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition bg-slate-950 text-white placeholder-slate-600">
                    </div>
                </div>

                <div class="mt-10">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-500 shadow-xl shadow-indigo-500/20 transition-all active:scale-[0.98]">
                        Entrar al Dashboard
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500 font-medium">
                    ¿No tienes cuenta? 
                    <a href="{% url 'register' %}" class="text-indigo-600 font-black hover:underline ml-1">Regístrate gratis</a>
                </p>
            </div>
        </div>
        
        <p class="text-center text-slate-600 text-xs mt-10 font-medium">
            &copy; 2026 RootDev MVP. Todos los derechos reservados.
        </p>
    </div>
</body>
</html>
