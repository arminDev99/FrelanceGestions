{% extends 'layout/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="/clientes/" class="text-indigo-600 hover:text-indigo-800 flex items-center text-sm font-semibold mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            Volver a la lista
        </a>
        <h1 class="text-3xl font-bold text-gray-900">Editar Cliente</h1>
        <p class="text-gray-500 mt-1">Modifica la información de {{ client.name }}.</p>
    </div>

    <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100">
        <form action="/clientes/{{ client.id }}/actualizar/" method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre Completo</label>
                    <input type="text" name="name" value="{{ client.name }}" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Correo Electrónico</label>
                    <input type="email" name="email" value="{{ client.email }}" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Empresa</label>
                    <input type="text" name="company" value="{{ client.company }}" 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
            </div>
            
            <div class="mt-10 flex space-x-4">
                <a href="/clientes/" class="flex-1 px-6 py-3 rounded-xl bg-gray-50 text-gray-700 font-bold hover:bg-gray-100 transition text-center">
                    Cancelar
                </a>
                <button type="submit" class="flex-1 px-6 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
