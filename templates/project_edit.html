{% extends 'layout/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="/proyectos/" class="text-emerald-600 hover:text-emerald-800 flex items-center text-sm font-semibold mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            Volver a la lista
        </a>
        <h1 class="text-3xl font-bold text-gray-900">Editar Proyecto</h1>
        <p class="text-gray-500 mt-1">Gestión del proyecto: {{ project.name }}.</p>
    </div>

    <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100">
        <form action="/proyectos/{{ project.id }}/actualizar/" method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Cliente Responsable</label>
                    <select name="client_id" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition bg-white text-gray-700">
                        {% for client in clients %}
                            <option value="{{ client.id }}" {% if client.id == project.client.id %}selected{% endif %}>{{ client.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre del Proyecto</label>
                    <input type="text" name="name" value="{{ project.name }}" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Descripción</label>
                    <textarea name="description" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition h-32">{{ project.description }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Estado</label>
                    <select name="status" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition bg-white text-gray-700">
                        <option value="active" {% if project.status == 'active' %}selected{% endif %}>Activo</option>
                        <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completado</option>
                        <option value="on_hold" {% if project.status == 'on_hold' %}selected{% endif %}>En espera</option>
                    </select>
                </div>
            </div>
            
            <div class="mt-10 flex space-x-4">
                <a href="/proyectos/" class="flex-1 px-6 py-3 rounded-xl bg-gray-50 text-gray-700 font-bold hover:bg-gray-100 transition text-center">
                    Cancelar
                </a>
                <button type="submit" class="flex-1 px-6 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
